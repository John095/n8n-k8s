apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: n8n
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: n8n-data
      containers:
        - name: n8n
          image: n8nio/n8n:latest
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          ports:
            - containerPort: 5678
          env:
            - name: N8N_BASIC_AUTH_ACTIVE
              value: "true"
            - name: N8N_BASIC_AUTH_USER
              value: "admin"
            - name: N8N_BASIC_AUTH_PASSWORD
              value: "changeme123"
            - name: WEBHOOK_URL
              value: "http://n8n.local"
            - name: N8N_HOST
              value: "n8n.local"
            - name: N8N_PORT
              value: "5678"
            - name: N8N_PROTOCOL
              value: "http"
            - name: N8N_RUNNERS_ENABLED
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60 # was 30
            periodSeconds: 10
            failureThreshold: 10 # allow 10 failures before giving up
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 120 # was 60 — give it 2 full minutes
            periodSeconds: 15
            failureThreshold: 5
